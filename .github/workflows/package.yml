name: build
on: [push, workflow_dispatch]

jobs:
  apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python y dependencias de Android
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-setuptools
          pip install --upgrade pip
          pip install "buildozer==1.5.0" "cython<3.0.0" wheel

      - name: Aceptar Licencias de Android automáticamente
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      - name: Compilar APK con Buildozer Nactivo
        run: |
          # Ejecutamos buildozer directamente usando el archivo .spec que ya creaste
          buildozer -v android debug

      - name: Subir APK terminada
        uses: actions/upload-artifact@v4
        with:
          name: app-valentina
          path: bin/*.apk
