name: build
on: [push, workflow_dispatch]

jobs:
  apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python y dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-setuptools
          pip install --upgrade pip
          pip install "buildozer==1.5.0" "cython<3.0.0" wheel

      - name: Configurar Caché de Android para evitar bloqueos
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Aceptar Licencias de Android
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      - name: Limpiar y Compilar APK
        run: |
          # Forzamos una limpieza previa para que no consuma doble memoria de procesos anteriores
          buildozer android clean
          # Compilamos usando el spec directo
          buildozer -v android debug

      - name: Subir APK terminada
        uses: actions/upload-artifact@v4
        with:
          name: app-valentina
          path: bin/*.apk
